<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,shrink-to-fit=no">
<meta name="format-detection" content="telephone=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>TechAI 资讯</title>
<style>
/* ============================================
   CSS Custom Properties — WeChat Design System
   ============================================ */
:root {
  /* WeChat Brand */
  --wechat-green: #07C160;
  --wechat-green-dark: #06AD56;
  --wechat-green-light: rgba(7,193,96,0.08);
  --wechat-blue: #576B95;
  --wechat-red: #FA5151;
  --wechat-orange: #F08519;

  /* Surface */
  --bg-page: #F5F5F5;
  --bg-card: #FFFFFF;
  --bg-mask: rgba(0,0,0,0.55);

  /* Text */
  --text-primary: #191919;
  --text-secondary: #888888;
  --text-muted: #B2B2B2;
  --text-link: #576B95;

  /* Border */
  --divider: #E5E5E5;
  --divider-light: #F0F0F0;

  /* Spacing - 8px base */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-8: 32px;

  /* Safe Area — fallback for non-notch */
  --safe-top: 0px;
  --safe-bottom: 0px;

  /* Layout */
  --topbar-h: 44px;
  --bottombar-h: 50px;
  --tab-h: 40px;

  /* Font */
  --font-stack: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
  --font-article: "PingFang SC", -apple-system, "Hiragino Sans GB", "Microsoft YaHei", serif;

  /* Radius */
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 16px;

  /* Shadow */
  --card-shadow: 0 1px 2px rgba(0,0,0,0.02);
  --card-shadow-hover: 0 2px 12px rgba(0,0,0,0.06);
  --bottom-shadow: 0 -1px 0 rgba(0,0,0,0.05);

  /* Transition */
  --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
}

/* Real safe-area from env() */
@supports (padding-top: env(safe-area-inset-top)) {
  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
}

/* ============================================
   Reset
   ============================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{
  font-size:16px;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
  -webkit-overflow-scrolling:touch;
  height:100%;
}
body{
  font-family:var(--font-stack);
  background:var(--bg-page);
  color:var(--text-primary);
  min-height:100%;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  /* Reserve space for fixed bars */
  padding-top:calc(var(--safe-top) + var(--topbar-h));
  padding-bottom:calc(var(--safe-bottom) + var(--bottombar-h) + var(--s-2));
  overflow-x:hidden;
  user-select:none;
  -webkit-user-select:none;
}

/* ============================================
   Top Bar — WeChat Style
   ============================================ */
.topbar{
  position:fixed;
  top:0;left:0;right:0;
  z-index:200;
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.topbar-status{
  height:var(--safe-top);
  background:var(--bg-card);
}
.topbar-main{
  height:var(--topbar-h);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 var(--s-4);
  position:relative;
}
.topbar-title{
  font-size:17px;
  font-weight:600;
  color:var(--text-primary);
  letter-spacing:0.01em;
}
.topbar-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:36px;height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  border:none;
  font-size:20px;
  color:var(--text-primary);
  cursor:pointer;
  border-radius:50%;
  transition:background 0.15s var(--ease);
  /* 44px touch area via invisible extension */
}
.topbar-btn::after{
  content:'';
  position:absolute;
  inset:-4px;
}
.topbar-btn:active{background:rgba(0,0,0,0.05)}
.topbar-btn.left{left:var(--s-3)}
.topbar-btn.right{right:var(--s-3)}

/* ============================================
   Category Tabs — Horizontal Scroll
   ============================================ */
.category-tabs{
  position:sticky;
  top:calc(var(--safe-top) + var(--topbar-h));
  z-index:150;
  background:var(--bg-card);
  border-bottom:0.5px solid var(--divider);
  height:var(--tab-h);
  display:flex;
  align-items:center;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:0 var(--s-4);
  gap:2px;
}
.category-tabs::-webkit-scrollbar{display:none}
.category-tab{
  flex-shrink:0;
  padding:var(--s-1) var(--s-4);
  font-size:14px;
  font-weight:400;
  color:var(--text-secondary);
  white-space:nowrap;
  position:relative;
  cursor:pointer;
  height:32px;
  display:flex;
  align-items:center;
  border-radius:16px;
  transition:all 0.2s var(--ease);
  background:transparent;
  border:none;
  font-family:var(--font-stack);
  /* Minimum touch area */
  min-width:44px;
  justify-content:center;
}
.category-tab.active{
  color:var(--wechat-green);
  font-weight:600;
  background:var(--wechat-green-light);
}

/* ============================================
   Content Area
   ============================================ */
.content{
  padding:var(--s-2) var(--s-4);
  min-height:calc(100vh - var(--safe-top) - var(--topbar-h) - var(--tab-h) - var(--safe-bottom) - var(--bottombar-h));
}

/* ============================================
   Article Card — WeChat Style
   ============================================ */
.article-list{
  display:flex;
  flex-direction:column;
  gap:var(--s-3);
}

.article-card{
  background:var(--bg-card);
  border-radius:var(--radius-md);
  overflow:hidden;
  box-shadow:var(--card-shadow);
  transition:box-shadow 0.2s var(--ease),transform 0.2s var(--ease);
  cursor:pointer;
  position:relative;
  animation:cardIn 0.4s var(--ease) both;
}
.article-card:active{
  transform:scale(0.985);
  box-shadow:var(--card-shadow-hover);
}
/* Staggered card entrance */
.article-card:nth-child(1){animation-delay:0.00s}
.article-card:nth-child(2){animation-delay:0.05s}
.article-card:nth-child(3){animation-delay:0.10s}
.article-card:nth-child(4){animation-delay:0.15s}
.article-card:nth-child(5){animation-delay:0.20s}
.article-card:nth-child(6){animation-delay:0.25s}

@keyframes cardIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* Card with cover image */
.article-card.has-cover .card-body{
  display:flex;
  gap:var(--s-3);
}
.article-card.has-cover .card-text{
  flex:1;
  min-width:0;
}
.card-cover{
  width:100px;
  height:70px;
  border-radius:var(--radius-sm);
  object-fit:cover;
  flex-shrink:0;
  background:var(--divider-light);
}
.card-cover-placeholder{
  width:100px;height:70px;
  border-radius:var(--radius-sm);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:#CCC;
}

/* Card: big image on top */
.article-card.hero-card .card-cover{
  width:100%;
  height:180px;
  border-radius:var(--radius-md) var(--radius-md) 0 0;
  margin-bottom:0;
}

.card-body{
  padding:var(--s-4);
}

.card-title{
  font-size:16px;
  font-weight:600;
  color:var(--text-primary);
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  margin-bottom:var(--s-2);
  letter-spacing:0.01em;
}
.hero-card .card-title{
  font-size:18px;
}

.card-meta{
  display:flex;
  align-items:center;
  gap:var(--s-2);
  font-size:12px;
  color:var(--text-muted);
}
.card-meta .source{
  color:var(--wechat-blue);
}
.card-meta .dot{
  width:2px;height:2px;
  border-radius:50%;
  background:var(--text-muted);
}

.card-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:var(--s-3);
  padding-top:var(--s-2);
  border-top:0.5px solid var(--divider-light);
}
.card-tag{
  font-size:11px;
  color:var(--wechat-green);
  padding:2px 8px;
  background:var(--wechat-green-light);
  border-radius:3px;
  font-weight:500;
}
.card-stats{
  font-size:11px;
  color:var(--text-muted);
  display:flex;
  gap:var(--s-3);
}

/* ============================================
   Empty State
   ============================================ */
.empty-state{
  text-align:center;
  padding:var(--s-8) var(--s-4);
  color:var(--text-muted);
}
.empty-state .icon{
  font-size:48px;
  margin-bottom:var(--s-4);
  opacity:0.4;
}
.empty-state p{
  font-size:14px;
}

/* ============================================
   Bottom Tab Bar — WeChat Style
   ============================================ */
.bottombar{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:200;
  background:var(--bg-card);
  border-top:0.5px solid var(--divider);
  box-shadow:var(--bottom-shadow);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.bottombar-inner{
  height:var(--bottombar-h);
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding:0 var(--s-2);
}
.bottombar-safe{
  height:var(--safe-bottom);
  background:var(--bg-card);
}
.tab-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  min-width:44px;
  min-height:44px;
  padding:0 var(--s-2);
  cursor:pointer;
  border:none;
  background:none;
  font-family:var(--font-stack);
  position:relative;
  transition:color 0.15s var(--ease);
  color:var(--text-muted);
}
.tab-item .tab-icon{
  font-size:22px;
  line-height:1;
  position:relative;
}
.tab-item .tab-label{
  font-size:10px;
  font-weight:500;
}
.tab-item.active{
  color:var(--wechat-green);
}
.tab-item.active .tab-label{
  font-weight:600;
}
/* Badge on tab */
.tab-badge{
  position:absolute;
  top:-4px;right:-10px;
  min-width:16px;height:16px;
  line-height:16px;
  font-size:10px;
  font-weight:600;
  color:#FFF;
  background:var(--wechat-red);
  border-radius:8px;
  text-align:center;
  padding:0 5px;
  font-family:var(--font-stack);
}

/* ============================================
   Search Overlay
   ============================================ */
.search-overlay{
  position:fixed;
  inset:0;
  z-index:300;
  background:var(--bg-card);
  display:flex;
  flex-direction:column;
  transform:translateY(-100%);
  transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
  padding-top:var(--safe-top);
}
.search-overlay.open{
  transform:translateY(0);
}
.search-header{
  display:flex;
  align-items:center;
  gap:var(--s-2);
  padding:0 var(--s-4);
  height:var(--topbar-h);
  border-bottom:0.5px solid var(--divider);
}
.search-input-wrap{
  flex:1;
  height:32px;
  background:var(--bg-page);
  border-radius:8px;
  display:flex;
  align-items:center;
  padding:0 var(--s-3);
  gap:var(--s-2);
}
.search-input-wrap .s-icon{
  font-size:16px;
  color:var(--text-muted);
  flex-shrink:0;
}
.search-input-wrap input{
  flex:1;
  border:none;
  background:none;
  font-size:15px;
  font-family:var(--font-stack);
  color:var(--text-primary);
  outline:none;
  height:100%;
}
.search-input-wrap input::placeholder{color:var(--text-muted)}
.search-input-wrap .clear-btn{
  width:22px;height:22px;
  border-radius:50%;
  background:var(--text-muted);
  color:#FFF;
  border:none;
  font-size:12px;
  cursor:pointer;
  display:none;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.search-input-wrap .clear-btn.visible{display:flex}
.search-cancel{
  flex-shrink:0;
  background:none;
  border:none;
  font-size:15px;
  color:var(--wechat-blue);
  font-family:var(--font-stack);
  cursor:pointer;
  padding:var(--s-2);
}
.search-results{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:var(--s-4);
}
.search-hint{
  text-align:center;
  color:var(--text-muted);
  font-size:14px;
  padding-top:80px;
}
.search-result-item{
  padding:var(--s-4) 0;
  border-bottom:0.5px solid var(--divider-light);
  cursor:pointer;
}
.search-result-item:active{background:rgba(0,0,0,0.02)}
.search-result-item .title{
  font-size:15px;
  color:var(--text-primary);
  margin-bottom:var(--s-1);
}
.search-result-item .meta{
  font-size:12px;
  color:var(--text-muted);
}

/* ============================================
   Toast
   ============================================ */
.toast{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.8);
  z-index:999;
  background:rgba(0,0,0,0.78);
  color:#FFF;
  padding:var(--s-3) var(--s-5);
  border-radius:8px;
  font-size:14px;
  pointer-events:none;
  opacity:0;
  transition:all 0.25s var(--ease);
  white-space:nowrap;
}
.toast.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

/* ============================================
   Pull-to-refresh indicator
   ============================================ */
.pull-indicator{
  text-align:center;
  padding:var(--s-4);
  font-size:12px;
  color:var(--text-muted);
  display:none;
}

/* ============================================
   Page Views (hidden/shown)
   ============================================ */
.page-view{
  display:none;
  animation:pageIn 0.3s var(--ease);
}
.page-view.active{
  display:block;
}
@keyframes pageIn{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}

/* ============================================
   Profile Page
   ============================================ */
.profile-header{
  background:var(--bg-card);
  text-align:center;
  padding:var(--s-8) var(--s-4) var(--s-6);
  margin-bottom:var(--s-3);
  border-radius:var(--radius-md);
}
.profile-avatar{
  width:64px;height:64px;
  border-radius:50%;
  background:var(--wechat-green-light);
  margin:0 auto var(--s-4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  color:var(--wechat-green);
}
.profile-name{
  font-size:18px;font-weight:600;
  margin-bottom:var(--s-1);
}
.profile-desc{
  font-size:13px;
  color:var(--text-muted);
}

.menu-list{
  background:var(--bg-card);
  border-radius:var(--radius-md);
  overflow:hidden;
  margin-bottom:var(--s-3);
}
.menu-item{
  display:flex;
  align-items:center;
  padding:var(--s-4);
  border-bottom:0.5px solid var(--divider-light);
  cursor:pointer;
  font-size:15px;
  min-height:44px;
  gap:var(--s-3);
}
.menu-item:last-child{border-bottom:none}
.menu-item:active{background:rgba(0,0,0,0.03)}
.menu-item .menu-icon{
  width:24px;text-align:center;
  font-size:18px;
}
.menu-item .menu-arrow{
  margin-left:auto;
  color:var(--text-muted);
  font-size:14px;
}
.menu-item .menu-badge{
  margin-left:auto;
  font-size:12px;
  color:var(--text-muted);
}

/* ============================================
   Categories Page
   ============================================ */
.category-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:var(--s-3);
}
.category-card{
  background:var(--bg-card);
  border-radius:var(--radius-md);
  padding:var(--s-5) var(--s-4);
  text-align:center;
  cursor:pointer;
  min-height:88px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:var(--s-2);
  transition:box-shadow 0.15s var(--ease);
  box-shadow:var(--card-shadow);
}
.category-card:active{
  box-shadow:var(--card-shadow-hover);
}
.category-card .cat-icon{
  font-size:28px;
}
.category-card .cat-name{
  font-size:14px;font-weight:600;
  color:var(--text-primary);
}
.category-card .cat-count{
  font-size:11px;color:var(--text-muted);
}

/* ============================================
   Keyboard Handling — iOS scroll on focus
   ============================================ */
/* Inputs inside search overlay already at top of screen */
/* For any inline inputs, we handle via JS scrollIntoView */

/* Responsive — larger screens center content */
@media(min-width:768px){
  body{
    max-width:480px;
    margin:0 auto;
    border-left:0.5px solid var(--divider);
    border-right:0.5px solid var(--divider);
  }
  .topbar{max-width:480px;left:50%;transform:translateX(-50%)}
  .bottombar{max-width:480px;left:50%;transform:translateX(-50%)}
  .category-tabs{max-width:480px;left:50%;transform:translateX(-50%)}
}
</style>
</head>
<body>

<!-- ==================== TOP BAR ==================== -->
<header class="topbar" id="topbar">
  <div class="topbar-status"></div>
  <div class="topbar-main">
    <button class="topbar-btn left" aria-label="Menu" id="headerLeftBtn" style="display:none">〈</button>
    <span class="topbar-title" id="topbarTitle">TechAI 资讯</span>
    <button class="topbar-btn right" aria-label="Search" onclick="openSearch()">⌕</button>
  </div>
</header>

<!-- ==================== CATEGORY TABS ==================== -->
<nav class="category-tabs" id="categoryTabs">
  <button class="category-tab active" data-cat="all" onclick="filterCategory('all',this)">推荐</button>
  <button class="category-tab" data-cat="ai" onclick="filterCategory('ai',this)">AI大模型</button>
  <button class="category-tab" data-cat="compute" onclick="filterCategory('compute',this)">算力</button>
  <button class="category-tab" data-cat="devtools" onclick="filterCategory('devtools',this)">开发工具</button>
  <button class="category-tab" data-cat="industry" onclick="filterCategory('industry',this)">行业动态</button>
  <button class="category-tab" data-cat="startup" onclick="filterCategory('startup',this)">创投</button>
</nav>

<!-- ==================== CONTENT ==================== -->
<main class="content" id="mainContent">

  <!-- HOME PAGE -->
  <div class="page-view active" id="page-home">
    <div class="article-list" id="articleList"></div>
    <div class="empty-state" id="emptyHome" style="display:none">
      <div class="icon">📭</div>
      <p>暂无相关文章</p>
    </div>
  </div>

  <!-- CATEGORIES PAGE -->
  <div class="page-view" id="page-categories">
    <div class="category-grid" id="categoryGrid"></div>
  </div>

  <!-- PROFILE PAGE -->
  <div class="page-view" id="page-profile">
    <div class="profile-header">
      <div class="profile-avatar">T</div>
      <div class="profile-name">TechAI 用户</div>
      <div class="profile-desc">关注科技前沿 · 洞察行业趋势</div>
    </div>
    <div class="menu-list">
      <div class="menu-item" onclick="toastMsg('收藏功能开发中')">
        <span class="menu-icon">☆</span> 我的收藏
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="toastMsg('历史记录开发中')">
        <span class="menu-icon">⌛</span> 阅读历史
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="toastMsg('夜间模式开发中')">
        <span class="menu-icon">🌙</span> 夜间模式
        <span class="menu-arrow">›</span>
      </div>
    </div>
    <div class="menu-list">
      <div class="menu-item" onclick="toastMsg('设置页面开发中')">
        <span class="menu-icon">⚙</span> 设置
        <span class="menu-arrow">›</span>
      </div>
      <div class="menu-item" onclick="toastMsg('已是最新版本')">
        <span class="menu-icon">ℹ</span> 关于
        <span class="menu-badge">v1.0.0</span>
      </div>
    </div>
  </div>

</main>

<!-- ==================== SEARCH OVERLAY ==================== -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-header">
    <div class="search-input-wrap" id="searchInputWrap">
      <span class="s-icon">⌕</span>
      <input type="search" id="searchInput" placeholder="搜索文章..." autocomplete="off"
        oninput="handleSearchInput(this)" onfocus="handleSearchFocus()" onblur="handleSearchBlur()">

/* ============================================
   Render Articles
   ============================================ */
function renderArticles(filter = 'all') {
  const container = document.getElementById('articleList');
  const empty = document.getElementById('emptyHome');
  const filtered = filter === 'all'
    ? articles
    : articles.filter(a => a.category === filter);

  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const first = filtered[0];
  const rest = filtered.slice(1);

  let html = '';

  // First card — hero style
  html += `
    <div class="article-card hero-card" onclick="openArticle(${first.id})">
      <div class="card-cover" style="background:linear-gradient(135deg, #07C16022, #06AD5622);display:flex;align-items:center;justify-content:center;font-size:64px;color:var(--wechat-green);">⚡</div>
      <div class="card-body">
        <div class="card-title">${first.title}</div>
        <div class="card-meta">
          <span class="source">${first.source}</span>
          <span class="dot"></span>
          <span>${first.time}</span>
          <span class="dot"></span>
          <span>${formatViews(first.views)} 阅读</span>
        </div>
        <div class="card-footer">
          <span class="card-tag">${first.tag}</span>
          <span class="card-stats">${first.excerpt.substring(0,30)}...</span>
        </div>
      </div>
    </div>
  `;

  // Rest — list cards
  rest.forEach(a => {
    html += `
      <div class="article-card has-cover" onclick="openArticle(${a.id})">
        <div class="card-body">
          <div class="card-cover-placeholder" style="background:${catColor(a.category)}15;color:${catColor(a.category)}">${catEmoji(a.category)}</div>
          <div class="card-text">
            <div class="card-title">${a.title}</div>
            <div class="card-meta">
              <span class="source">${a.source}</span>
              <span class="dot"></span>
              <span>${a.time}</span>
            </div>
            <div class="card-footer">
              <span class="card-tag">${a.tag}</span>
              <span class="card-stats">👁 ${formatViews(a.views)}</span>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;
}

function catEmoji(cat) {
  const m = { ai:'🤖', compute:'💻', devtools:'🛠', industry:'🏭', startup:'🚀' };
  return m[cat] || '📄';
}
function catColor(cat) {
  const m = { ai:'#07C160', compute:'#576B95', devtools:'#F08519', industry:'#FA5151', startup:'#6B5CE7' };
  return m[cat] || '#888';
}
function formatViews(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

/* ============================================
   Category Filter
   ============================================ */
function filterCategory(cat, el) {
  document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderArticles(cat);
}

/* ============================================
   Bottom Tab Navigation
   ============================================ */
let currentTab = 'home';
function switchTab(tab, el) {
  if (currentTab === tab) return;
  currentTab = tab;

  // Update tab active states
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');

  // Show/hide top bar elements
  const catTabs = document.getElementById('categoryTabs');
  const title = document.getElementById('topbarTitle');
  const leftBtn = document.getElementById('headerLeftBtn');

  // Hide all pages
  document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));

  switch (tab) {
    case 'home':
      document.getElementById('page-home').classList.add('active');
      catTabs.style.display = 'flex';
      title.textContent = 'TechAI 资讯';
      leftBtn.style.display = 'none';
      break;
    case 'categories':
      document.getElementById('page-categories').classList.add('active');
      catTabs.style.display = 'none';
      title.textContent = '分类';
      leftBtn.style.display = 'none';
      renderCategories();
      break;
    case 'profile':
      document.getElementById('page-profile').classList.add('active');
      catTabs.style.display = 'none';
      title.textContent = '我的';
      leftBtn.style.display = 'none';
      break;
  }

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================
   Search Overlay
   ============================================ */
function openSearch() {
  const overlay = document.getElementById('searchOverlay');
  overlay.classList.add('open');
  setTimeout(() => {
    document.getElementById('searchInput').focus();
  }, 350);
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '<div class="search-hint">输入关键词搜索文章</div>';
  document.getElementById('clearBtn').classList.remove('visible');
}

function handleSearchInput(input) {
  const q = input.value.trim();
  const clearBtn = document.getElementById('clearBtn');
  const results = document.getElementById('searchResults');

  if (q) {
    clearBtn.classList.add('visible');
    const hits = articles.filter(a =>
      a.title.includes(q) || a.excerpt.includes(q) || a.tag.includes(q)
    );
    if (hits.length === 0) {
      results.innerHTML = '<div class="search-hint">未找到相关文章</div>';
    } else {
      results.innerHTML = hits.map(a => `
        <div class="search-result-item" onclick="closeSearch();openArticle(${a.id})">
          <div class="title">${highlightMatch(a.title, q)}</div>
          <div class="meta">${a.source} · ${a.time} · ${formatViews(a.views)} 阅读</div>
        </div>
      `).join('');
    }
  } else {
    clearBtn.classList.remove('visible');
    results.innerHTML = '<div class="search-hint">输入关键词搜索文章</div>';
  }
}

function highlightMatch(text, q) {
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return text.replace(re, '<em style="color:var(--wechat-green);font-style:normal">$1</em>');
}

function clearSearch() {
  const input = document.getElementById('searchInput');
  input.value = '';
  input.focus();
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('searchResults').innerHTML = '<div class="search-hint">输入关键词搜索文章</div>';
}

function openArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  toastMsg('文章详情页开发中: ' + a.title.substring(0, 20) + '...');

/* ============================================
   Toast
   ============================================ */
let toastTimer;
function toastMsg(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ============================================
   Keyboard Avoidance — scroll input into view
   ============================================ */
document.addEventListener('focusin', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    // Delay for keyboard to appear
    setTimeout(() => {
      const rect = e.target.getBoundingClientRect();
      if (rect.bottom > window.innerHeight * 0.55) {
        e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 300);
  }
});

/* ============================================
   Active state cleanup on scroll (iOS)
   ============================================ */
document.addEventListener('touchstart', function(){}, { passive: true });
